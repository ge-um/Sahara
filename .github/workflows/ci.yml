name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Secret Files
        env:
          GOOGLE_SERVICE_INFO: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          API_CONFIG: ${{ secrets.API_CONFIG_SWIFT }}
          DEVELOPER_CONFIG: ${{ secrets.DEVELOPER_CONFIG_SWIFT }}
        run: |
          echo "$GOOGLE_SERVICE_INFO" | base64 --decode > Sahara/GoogleService-Info.plist
          mkdir -p Sahara/Secret
          echo "$API_CONFIG" | base64 --decode > Sahara/Secret/APIConfig.swift
          echo "$DEVELOPER_CONFIG" | base64 --decode > Sahara/Secret/DeveloperConfig.swift

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme Sahara \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build
        run: |
          xcodebuild build \
            -scheme Sahara \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            -clonedSourcePackagesDirPath SourcePackages \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO
