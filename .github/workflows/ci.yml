name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches:
      - develop
      - main
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Secret Files
        env:
          GOOGLE_SERVICE_INFO: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          API_CONFIG: ${{ secrets.API_CONFIG_SWIFT }}
          DEVELOPER_CONFIG: ${{ secrets.DEVELOPER_CONFIG_SWIFT }}
        run: |
          echo "$GOOGLE_SERVICE_INFO" | base64 --decode > Sahara/GoogleService-Info.plist
          mkdir -p Sahara/Secret
          echo "$API_CONFIG" | base64 --decode > Sahara/Secret/APIConfig.swift
          echo "$DEVELOPER_CONFIG" | base64 --decode > Sahara/Secret/DeveloperConfig.swift

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build and Test
        run: |
          xcodebuild test \
            -scheme Sahara \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
